<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RVH Fundición | Portal de Seguimiento</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f2942">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RVH Producción">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          rvh: {
            bg: '#f1f5f9',
            navy: '#0f2942',
            navyLight: '#1e3a8a',
            steel: '#475569',
            amber: '#d97706',
            border: '#e2e8f0'
          }
        }
      }
    }
  }
</script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
  .card-enter { animation: card-in .25s ease-out; }
  @keyframes card-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .spinner { border: 3px solid #e2e8f0; border-top-color: #d97706; border-radius: 50%; width: 28px; height: 28px; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body class="bg-rvh-bg text-slate-800 min-h-screen">

  <header class="sticky top-0 z-20 bg-rvh-navy text-white shadow-md">
    <div class="max-w-[1600px] mx-auto px-4 md:px-6 py-4 flex flex-col md:flex-row gap-4 md:items-center md:justify-between">
      <div class="flex items-center gap-3">
        <img src="IMG_8258.png" alt="RVH Logo"
          style="max-height: 50px; height: 50px; width: auto; object-fit: contain;"
          class="rounded-lg bg-white/10 border border-white/20 p-1"
          onerror="this.style.display='none';">
        <div>
          <h1 id="app-title" class="text-lg md:text-xl font-bold leading-tight">RVH Fundición</h1>
          <p id="app-subtitle" class="text-xs text-slate-300 font-semibold uppercase tracking-wide">Portal de Seguimiento de Pedidos</p>
        </div>
      </div>

      <div id="header-controls" class="hidden flex-1 md:flex-none items-center gap-3 md:max-w-md">
        <div class="relative flex-1">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11a6 6 0 11-12 0 6 6 0 0112 0z" />
          </svg>
          <input id="search-input" type="text" placeholder="Buscar por OT o descripción..."
            class="w-full bg-white text-slate-800 border border-white/20 rounded-lg py-2.5 pl-9 pr-9 text-sm outline-none focus:ring-2 focus:ring-rvh-amber/60 placeholder:text-slate-400">
          <button id="clear-search" class="hidden absolute right-2.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-700">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
          </button>
        </div>
        <button id="refresh-btn" title="Actualizar ahora"
          class="shrink-0 w-10 h-10 flex items-center justify-center rounded-lg bg-white/10 border border-white/20 hover:bg-white/20 transition">
          <svg id="refresh-icon" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h5M20 20v-5h-5M4 9a8 8 0 0114.9-3.4M20 15a8 8 0 01-14.9 3.4" />
          </svg>
        </button>
      </div>
    </div>
    <div id="status-bar" class="max-w-[1600px] mx-auto px-4 md:px-6 pb-2.5 text-xs text-slate-300 flex items-center gap-2"></div>
  </header>

  <main class="max-w-[1600px] mx-auto px-4 md:px-6 py-6 space-y-6">

    <!-- Pantalla de inicio: se muestra solo si la URL no trae ?cliente=.
         No se carga ningún dato de la planilla acá. -->
    <section id="landing-view" class="max-w-md mx-auto mt-10 md:mt-20">
      <div class="bg-white border border-rvh-border rounded-2xl shadow-sm p-8 text-center">
        <img src="IMG_8258.png" alt="RVH Logo"
          style="max-height: 70px; height: 70px; width: auto; object-fit: contain; margin: 0 auto 1.25rem;"
          onerror="this.style.display='none';">
        <h2 class="text-xl font-bold text-rvh-navy mb-1">Consultá tus órdenes</h2>
        <p class="text-sm text-slate-500 mb-6">Ingresá el nombre o código de tu empresa para ver el estado de tus pedidos en RVH Fundición.</p>
        <form id="landing-form" class="flex flex-col gap-3">
          <input id="landing-input" type="text" placeholder="Ingrese su código de cliente"
            class="w-full px-4 py-3 bg-rvh-bg border border-rvh-border rounded-lg text-sm outline-none focus:ring-2 focus:ring-rvh-navyLight/50 placeholder:text-slate-400"
            required>
          <button type="submit" class="w-full bg-rvh-navy text-white font-bold py-3 rounded-lg hover:bg-rvh-navyLight transition shadow-sm">Buscar</button>
        </form>
      </div>
    </section>

    <!-- Vista de resultados: se muestra solo si la URL trae ?cliente=. -->
    <div id="portal-view" class="hidden space-y-6">
      <div id="error-banner" class="hidden bg-red-50 border border-red-200 text-red-700 text-sm rounded-xl px-4 py-3 flex items-center justify-between gap-4">
        <span id="error-text"></span>
        <button id="error-retry" class="shrink-0 font-bold underline underline-offset-2 hover:text-red-900">Reintentar</button>
      </div>

      <div id="tabs" class="flex flex-wrap gap-2"></div>

      <div id="loading-state" class="flex flex-col items-center justify-center py-24 gap-3 text-slate-400">
        <div class="spinner"></div>
        <p class="text-sm">Cargando órdenes de trabajo...</p>
      </div>

      <div id="board" class="hidden grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5"></div>

      <div id="empty-state" class="hidden text-center py-24 text-slate-400">
        <p id="empty-title" class="text-lg font-bold text-slate-500">No se encontraron órdenes</p>
        <p id="empty-subtitle" class="text-sm mt-1">Probá con otro término de búsqueda o cambiá de sección.</p>
      </div>
    </div>
  </main>

<script src="shared.js"></script>
<script>
(function () {
  'use strict';

  const { CONFIG, TABS, DEMO_CSV, normalize, debounce, parseCSV, groupOrders, matchClient, fetchCSVText, buildCard } = window.RVH;

  const clienteParam = (new URLSearchParams(window.location.search).get('cliente') || '').trim();

  const el = {
    appTitle: document.getElementById('app-title'),
    appSubtitle: document.getElementById('app-subtitle'),
    headerControls: document.getElementById('header-controls'),
    landingView: document.getElementById('landing-view'),
    landingForm: document.getElementById('landing-form'),
    landingInput: document.getElementById('landing-input'),
    portalView: document.getElementById('portal-view'),
    tabs: document.getElementById('tabs'),
    board: document.getElementById('board'),
    loading: document.getElementById('loading-state'),
    empty: document.getElementById('empty-state'),
    emptyTitle: document.getElementById('empty-title'),
    emptySubtitle: document.getElementById('empty-subtitle'),
    errorBanner: document.getElementById('error-banner'),
    errorText: document.getElementById('error-text'),
    errorRetry: document.getElementById('error-retry'),
    search: document.getElementById('search-input'),
    clearSearch: document.getElementById('clear-search'),
    refreshBtn: document.getElementById('refresh-btn'),
    refreshIcon: document.getElementById('refresh-icon'),
    statusBar: document.getElementById('status-bar')
  };

  // -----------------------------------------------------------------
  // Sin ?cliente=: pantalla de búsqueda, sin tocar la planilla.
  // -----------------------------------------------------------------
  if (!clienteParam) {
    el.landingInput.focus();
    el.landingForm.addEventListener('submit', e => {
      e.preventDefault();
      const value = el.landingInput.value.trim();
      if (!value) return;
      if (value.toLowerCase() === 'rvh-admin') {
        window.location.href = 'fabrica.html';
        return;
      }
      window.location.href = '?cliente=' + encodeURIComponent(value);
    });
    return;
  }

  // -----------------------------------------------------------------
  // Con ?cliente=: portal filtrado. Nunca se muestra nada de otro cliente.
  // -----------------------------------------------------------------
  el.landingView.classList.add('hidden');
  el.portalView.classList.remove('hidden');
  el.headerControls.classList.remove('hidden');

  let allOrders = [];
  let clientOrders = [];
  let clientName = null;
  let activeTab = 'pendiente';

  function getFilteredOrders() {
    const bucketOrders = clientOrders.filter(o => o.bucket === activeTab);
    const q = normalize(el.search.value);
    if (!q) return bucketOrders;
    return bucketOrders.filter(order => {
      const haystack = normalize([order.otNumber, ...order.items.map(i => i.descripcion)].join(' '));
      return haystack.includes(q);
    });
  }

  function renderTabs() {
    el.tabs.innerHTML = '';
    TABS.forEach(tab => {
      const count = clientOrders.filter(o => o.bucket === tab.id).length;
      const isActive = tab.id === activeTab;
      const btn = document.createElement('button');
      btn.className = `px-4 py-2.5 rounded-lg text-sm font-bold border transition ${
        isActive
          ? 'bg-rvh-navy text-white border-rvh-navy shadow-sm'
          : 'bg-white text-slate-600 border-rvh-border hover:border-rvh-navyLight hover:text-rvh-navyLight'
      }`;
      btn.textContent = `${tab.label} (${count})`;
      btn.addEventListener('click', () => {
        if (activeTab === tab.id) return;
        activeTab = tab.id;
        renderTabs();
        refreshView();
      });
      el.tabs.appendChild(btn);
    });
  }

  function renderBoard(orders) {
    el.board.innerHTML = '';
    orders.forEach(order => el.board.appendChild(buildCard(order)));
    el.board.classList.toggle('hidden', orders.length === 0);
    el.empty.classList.toggle('hidden', orders.length !== 0);
  }

  function refreshView() {
    renderBoard(getFilteredOrders());
  }

  function applyClientHeader() {
    if (clientName) {
      el.appTitle.textContent = `Portal de Seguimiento - ${clientName}`;
      el.appSubtitle.textContent = 'Consulta de Órdenes de Trabajo';
      el.emptyTitle.textContent = 'No se encontraron órdenes';
      el.emptySubtitle.textContent = 'No hay órdenes de este cliente en esta sección.';
    } else {
      el.appTitle.textContent = 'Portal de Seguimiento';
      el.appSubtitle.textContent = 'Cliente no encontrado';
      el.emptyTitle.textContent = 'Cliente no encontrado';
      el.emptySubtitle.textContent = 'Verificá el enlace recibido o comunicate con RVH Fundición.';
    }
  }

  function setStatusBar(usingDemo) {
    const now = new Date();
    const time = now.toLocaleTimeString('es-PY', { hour: '2-digit', minute: '2-digit' });
    el.statusBar.innerHTML = '';
    const dot = document.createElement('span');
    dot.className = `w-1.5 h-1.5 rounded-full inline-block ${usingDemo ? 'bg-amber-400' : 'bg-emerald-400'}`;
    el.statusBar.appendChild(dot);
    const text = document.createElement('span');
    text.textContent = usingDemo
      ? `Modo demostración (sin conexión a la planilla) · Actualizado ${time}`
      : `Datos en vivo · Actualizado ${time}`;
    el.statusBar.appendChild(text);
  }

  function showError(message) {
    el.errorText.textContent = message;
    el.errorBanner.classList.remove('hidden');
  }
  function hideError() {
    el.errorBanner.classList.add('hidden');
  }

  async function loadData({ silent } = {}) {
    if (!silent) {
      el.loading.classList.remove('hidden');
      el.board.classList.add('hidden');
      el.empty.classList.add('hidden');
    }
    el.refreshIcon.classList.add('animate-spin');

    let usingDemo = false;
    try {
      const text = await fetchCSVText(CONFIG.CSV_URL);
      allOrders = groupOrders(parseCSV(text));
      hideError();
    } catch (err) {
      if (allOrders.length === 0) {
        allOrders = groupOrders(parseCSV(DEMO_CSV));
        usingDemo = true;
      }
      showError(err.message || 'Error al cargar los datos.');
    } finally {
      // Filtro estricto: solo las órdenes del cliente que matcheó quedan
      // en memoria para renderizar. Nada de otros clientes se procesa acá.
      clientName = matchClient(allOrders, clienteParam);
      clientOrders = clientName
        ? allOrders.filter(o => o.cliente === clientName)
        : [];

      applyClientHeader();
      renderTabs();
      refreshView();
      setStatusBar(usingDemo);
      el.loading.classList.add('hidden');
      el.board.classList.remove('hidden');
      el.refreshIcon.classList.remove('animate-spin');
    }
  }

  el.search.addEventListener('input', debounce(() => {
    el.clearSearch.classList.toggle('hidden', el.search.value.trim() === '');
    refreshView();
  }, 150));

  el.clearSearch.addEventListener('click', () => {
    el.search.value = '';
    el.clearSearch.classList.add('hidden');
    refreshView();
    el.search.focus();
  });

  el.refreshBtn.addEventListener('click', () => loadData());
  el.errorRetry.addEventListener('click', () => loadData());

  loadData();
  setInterval(() => loadData({ silent: true }), CONFIG.REFRESH_MS);
})();
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(err => console.error('Error al registrar el service worker:', err));
    });
  }
</script>
</body>
</html>
