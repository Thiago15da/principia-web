<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RVH Fundición | Panel Interno</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f2942">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RVH Fábrica">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          rvh: {
            bg: '#f1f5f9',
            navy: '#0f2942',
            navyLight: '#1e3a8a',
            steel: '#475569',
            amber: '#d97706',
            border: '#e2e8f0'
          }
        }
      }
    }
  }
</script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
  .card-enter { animation: card-in .25s ease-out; }
  @keyframes card-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .spinner { border: 3px solid #e2e8f0; border-top-color: #d97706; border-radius: 50%; width: 28px; height: 28px; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body class="bg-rvh-bg text-slate-800 min-h-screen">

  <header class="sticky top-0 z-20 bg-rvh-navy text-white shadow-md">
    <div class="max-w-[1600px] mx-auto px-4 md:px-6 py-4 flex flex-col md:flex-row gap-4 md:items-center md:justify-between">
      <div class="flex items-center gap-3">
        <img src="IMG_8258.png" alt="RVH Logo"
          style="max-height: 50px; height: 50px; width: auto; object-fit: contain;"
          class="rounded-lg bg-white/10 border border-white/20 p-1"
          onerror="this.style.display='none';">
        <div>
          <h1 class="text-lg md:text-xl font-bold leading-tight">RVH Fundición</h1>
          <p class="text-xs text-slate-300 font-semibold uppercase tracking-wide">Panel Interno de Producción</p>
        </div>
      </div>

      <div class="flex flex-1 md:flex-none items-center gap-3 md:max-w-md">
        <div class="relative flex-1">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11a6 6 0 11-12 0 6 6 0 0112 0z" />
          </svg>
          <input id="search-input" type="text" placeholder="Buscar por OT, cliente o descripción..."
            class="w-full bg-white text-slate-800 border border-white/20 rounded-lg py-2.5 pl-9 pr-9 text-sm outline-none focus:ring-2 focus:ring-rvh-amber/60 placeholder:text-slate-400">
          <button id="clear-search" class="hidden absolute right-2.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-700">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
          </button>
        </div>
        <button id="refresh-btn" title="Actualizar ahora"
          class="shrink-0 w-10 h-10 flex items-center justify-center rounded-lg bg-white/10 border border-white/20 hover:bg-white/20 transition">
          <svg id="refresh-icon" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h5M20 20v-5h-5M4 9a8 8 0 0114.9-3.4M20 15a8 8 0 01-14.9 3.4" />
          </svg>
        </button>
      </div>
    </div>
    <div id="status-bar" class="max-w-[1600px] mx-auto px-4 md:px-6 pb-2.5 text-xs text-slate-300 flex items-center gap-2"></div>
  </header>

  <main class="max-w-[1600px] mx-auto px-4 md:px-6 py-6 space-y-6">

    <div id="gerencia-dashboard" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>

    <div id="error-banner" class="hidden bg-red-50 border border-red-200 text-red-700 text-sm rounded-xl px-4 py-3 flex items-center justify-between gap-4">
      <span id="error-text"></span>
      <button id="error-retry" class="shrink-0 font-bold underline underline-offset-2 hover:text-red-900">Reintentar</button>
    </div>

    <div id="metrics" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>

    <div id="tabs" class="flex flex-wrap gap-2"></div>

    <div id="loading-state" class="flex flex-col items-center justify-center py-24 gap-3 text-slate-400">
      <div class="spinner"></div>
      <p class="text-sm">Cargando órdenes de trabajo...</p>
    </div>

    <div id="board" class="hidden grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5"></div>

    <div id="empty-state" class="hidden text-center py-24 text-slate-400">
      <p class="text-lg font-bold text-slate-500">No se encontraron órdenes</p>
      <p class="text-sm mt-1">Probá con otro término de búsqueda o cambiá de sección.</p>
    </div>
  </main>

<script src="shared.js"></script>
<script>
(function () {
  'use strict';

  // -----------------------------------------------------------------
  // Acceso: pide contraseña antes de tocar el DOM o pedir la planilla.
  // Esto es solo una traba del lado del cliente (cualquiera con acceso
  // a las herramientas de desarrollador puede saltarla) — no reemplaza
  // un control de acceso real en el servidor, pero cumple lo pedido:
  // bloquear la vista y el fetch si la contraseña falla.
  // -----------------------------------------------------------------
  const PASSWORD = 'RVH2026';
  const entered = window.prompt('Acceso interno RVH Fundición\nIngresá la contraseña:');
  if (entered !== PASSWORD) {
    document.body.innerHTML = 'Acceso Denegado';
    return;
  }

  const { CONFIG, TABS, DEMO_CSV, normalize, debounce, parseCSV, groupOrders, fetchCSVText, buildCard } = window.RVH;

  const el = {
    gerencia: document.getElementById('gerencia-dashboard'),
    metrics: document.getElementById('metrics'),
    tabs: document.getElementById('tabs'),
    board: document.getElementById('board'),
    loading: document.getElementById('loading-state'),
    empty: document.getElementById('empty-state'),
    errorBanner: document.getElementById('error-banner'),
    errorText: document.getElementById('error-text'),
    errorRetry: document.getElementById('error-retry'),
    search: document.getElementById('search-input'),
    clearSearch: document.getElementById('clear-search'),
    refreshBtn: document.getElementById('refresh-btn'),
    refreshIcon: document.getElementById('refresh-icon'),
    statusBar: document.getElementById('status-bar')
  };

  let allOrders = [];
  let activeTab = 'pendiente';

  // ---------------------------------------------------------------------
  // Dashboard de Gerencia (piezas, no órdenes), sobre las órdenes activas
  // ("pendiente" = Pendiente/En Curso).
  // ---------------------------------------------------------------------
  function computeGerenciaStats() {
    const activas = allOrders.filter(o => o.bucket === 'pendiente');

    const totalPedidas = activas.reduce((sum, o) => sum + o.totalCantidad, 0);
    const totalListas = activas.reduce((sum, o) => sum + o.totalListos, 0);
    const totalRechazadas = activas.reduce((sum, o) => sum + o.totalRechazados, 0);

    const porCliente = new Map();
    activas.forEach(o => {
      porCliente.set(o.cliente, (porCliente.get(o.cliente) || 0) + o.totalCantidad);
    });
    let topCliente = null;
    let topVolumen = 0;
    porCliente.forEach((volumen, cliente) => {
      if (volumen > topVolumen) { topVolumen = volumen; topCliente = cliente; }
    });

    return { totalPedidas, totalListas, totalRechazadas, topCliente, topVolumen };
  }

  function renderGerenciaDashboard() {
    const stats = computeGerenciaStats();
    const tiles = [
      { label: '📊 Total Piezas Pedidas', value: String(stats.totalPedidas), valueClass: 'text-2xl font-black mt-1 text-rvh-navy' },
      { label: '✅ Total Piezas Listas', value: String(stats.totalListas), valueClass: 'text-2xl font-black mt-1 text-emerald-600' },
      {
        label: '❌ Total Piezas Rechazadas',
        value: String(stats.totalRechazadas),
        valueClass: `text-2xl font-black mt-1 ${stats.totalRechazadas > 0 ? 'text-red-600' : 'text-slate-400'}`,
        borderClass: stats.totalRechazadas > 0 ? 'border-red-200' : 'border-rvh-border'
      },
      {
        label: '🏆 Cliente con más volumen',
        value: stats.topCliente || 'Sin datos',
        valueClass: 'text-base font-black mt-1 text-rvh-navyLight truncate',
        sub: stats.topCliente ? `${stats.topVolumen} piezas pedidas` : ''
      }
    ];

    el.gerencia.innerHTML = '';
    tiles.forEach(t => {
      const tile = document.createElement('div');
      tile.className = `bg-white border rounded-xl shadow-sm px-4 py-3.5 ${t.borderClass || 'border-rvh-border'}`;
      const label = document.createElement('p');
      label.className = 'text-[11px] font-bold uppercase tracking-wide text-slate-400';
      label.textContent = t.label;
      const value = document.createElement('p');
      value.className = t.valueClass;
      value.textContent = t.value;
      if (t.value.length > 14) value.title = t.value;
      tile.append(label, value);
      if (t.sub) {
        const sub = document.createElement('p');
        sub.className = 'text-[11px] text-slate-400 font-medium mt-0.5';
        sub.textContent = t.sub;
        tile.appendChild(sub);
      }
      el.gerencia.appendChild(tile);
    });
  }

  function renderMetrics() {
    const total = allOrders.length;
    const enCurso = allOrders.filter(o => o.bucket === 'pendiente').length;
    const terminadas = allOrders.filter(o => o.bucket === 'terminado').length;
    const alertas = allOrders.filter(o => o.bucket === 'pendiente' && o.diasEnProceso !== null && o.diasEnProceso > CONFIG.DIAS_ALERTA).length;

    const tiles = [
      { label: 'Total Órdenes', value: total, accent: 'text-rvh-navy' },
      { label: 'En Curso', value: enCurso, accent: 'text-rvh-navyLight' },
      { label: 'Terminadas', value: terminadas, accent: 'text-emerald-600' },
      { label: `Alertas (> ${CONFIG.DIAS_ALERTA} días)`, value: alertas, accent: alertas > 0 ? 'text-red-600' : 'text-slate-400' }
    ];

    el.metrics.innerHTML = '';
    tiles.forEach(m => {
      const tile = document.createElement('div');
      tile.className = 'bg-white border border-rvh-border rounded-xl shadow-sm px-4 py-3.5';
      const label = document.createElement('p');
      label.className = 'text-[11px] font-bold uppercase tracking-wide text-slate-400';
      label.textContent = m.label;
      const value = document.createElement('p');
      value.className = `text-2xl font-black mt-1 ${m.accent}`;
      value.textContent = m.value;
      tile.append(label, value);
      el.metrics.appendChild(tile);
    });
  }

  function renderTabs() {
    el.tabs.innerHTML = '';
    TABS.forEach(tab => {
      const count = allOrders.filter(o => o.bucket === tab.id).length;
      const isActive = tab.id === activeTab;

      const btn = document.createElement('button');
      btn.className = `px-4 py-2.5 rounded-lg text-sm font-bold border transition ${
        isActive
          ? 'bg-rvh-navy text-white border-rvh-navy shadow-sm'
          : 'bg-white text-slate-600 border-rvh-border hover:border-rvh-navyLight hover:text-rvh-navyLight'
      }`;
      btn.textContent = `${tab.label} (${count})`;
      btn.addEventListener('click', () => {
        if (activeTab === tab.id) return;
        activeTab = tab.id;
        renderTabs();
        refreshView();
      });
      el.tabs.appendChild(btn);
    });
  }

  function getFilteredOrders() {
    const bucketOrders = allOrders.filter(o => o.bucket === activeTab);
    const q = normalize(el.search.value);
    if (!q) return bucketOrders;
    return bucketOrders.filter(order => {
      const haystack = normalize([
        order.otNumber,
        order.cliente,
        ...order.items.map(i => i.descripcion)
      ].join(' '));
      return haystack.includes(q);
    });
  }

  function renderBoard(orders) {
    el.board.innerHTML = '';
    orders.forEach(order => el.board.appendChild(buildCard(order)));
    el.board.classList.toggle('hidden', orders.length === 0);
    el.empty.classList.toggle('hidden', orders.length !== 0);
  }

  function refreshView() {
    renderBoard(getFilteredOrders());
  }

  function setStatusBar(usingDemo) {
    const now = new Date();
    const time = now.toLocaleTimeString('es-PY', { hour: '2-digit', minute: '2-digit' });
    el.statusBar.innerHTML = '';
    const dot = document.createElement('span');
    dot.className = `w-1.5 h-1.5 rounded-full inline-block ${usingDemo ? 'bg-amber-400' : 'bg-emerald-400'}`;
    el.statusBar.appendChild(dot);
    const text = document.createElement('span');
    text.textContent = usingDemo
      ? `Modo demostración (sin conexión a la planilla) · Actualizado ${time}`
      : `Datos en vivo · Actualizado ${time}`;
    el.statusBar.appendChild(text);
  }

  function showError(message) {
    el.errorText.textContent = message;
    el.errorBanner.classList.remove('hidden');
  }
  function hideError() {
    el.errorBanner.classList.add('hidden');
  }

  async function loadData({ silent } = {}) {
    if (!silent) {
      el.loading.classList.remove('hidden');
      el.board.classList.add('hidden');
      el.empty.classList.add('hidden');
    }
    el.refreshIcon.classList.add('animate-spin');

    let usingDemo = false;
    try {
      const text = await fetchCSVText(CONFIG.CSV_URL);
      allOrders = groupOrders(parseCSV(text));
      hideError();
    } catch (err) {
      if (allOrders.length === 0) {
        allOrders = groupOrders(parseCSV(DEMO_CSV));
        usingDemo = true;
      }
      showError(err.message || 'Error al cargar los datos.');
    } finally {
      renderGerenciaDashboard();
      renderMetrics();
      renderTabs();
      refreshView();
      setStatusBar(usingDemo);
      el.loading.classList.add('hidden');
      el.board.classList.remove('hidden');
      el.refreshIcon.classList.remove('animate-spin');
    }
  }

  el.search.addEventListener('input', debounce(() => {
    el.clearSearch.classList.toggle('hidden', el.search.value.trim() === '');
    refreshView();
  }, 150));

  el.clearSearch.addEventListener('click', () => {
    el.search.value = '';
    el.clearSearch.classList.add('hidden');
    refreshView();
    el.search.focus();
  });

  el.refreshBtn.addEventListener('click', () => loadData());
  el.errorRetry.addEventListener('click', () => loadData());

  loadData();
  setInterval(() => loadData({ silent: true }), CONFIG.REFRESH_MS);
})();
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(err => console.error('Error al registrar el service worker:', err));
    });
  }
</script>
</body>
</html>
